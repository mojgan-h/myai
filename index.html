<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Age Calculator</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="card hero-card">
        <p class="eyebrow">Simple App</p>
        <h1>User Age Calculator</h1>
        <p class="subtitle">Add users, store their details, and instantly calculate their age.</p>
      </section>

      <section class="card form-card">
        <h2>Add a User</h2>
        <form id="user-form" class="user-form">
          <label>
            Full name
            <input id="name" name="name" type="text" placeholder="Jane Doe" required />
          </label>

          <label>
            Date of birth
            <input id="dob" name="dob" type="date" required />
          </label>

          <label>
            Email
            <input id="email" name="email" type="email" placeholder="jane@example.com" required />
          </label>

          <button type="submit">Add User</button>
        </form>
      </section>

      <section class="card list-card">
        <div class="list-heading">
          <h2>Stored Users</h2>
          <button id="clear-btn" class="ghost-btn" type="button">Clear All</button>
        </div>

        <p id="empty-state" class="empty-state">No users yet. Add the first one above.</p>
        <ul id="user-list" class="user-list"></ul>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
